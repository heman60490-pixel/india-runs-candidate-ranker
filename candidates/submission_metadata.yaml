methodology_summary: >
  We use a multi-signal ranking pipeline combining semantic similarity
  (all-MiniLM-L6-v2 BERT embeddings, 35% weight), weighted skill overlap
  with required/optional skill distinction (30%), years of experience (15%),
  behavioural signals from redrob_signals object (20%), and location/product
  company/notice period bonuses. Honeypot candidates are filtered pre-ranking
  using profile consistency checks (impossible profiles, keyword stuffers,
  non-tech titles with AI keywords). The ranking step runs entirely on CPU
  via batch encoding (batch_size=512). No external API calls are made during
  ranking. JD-specific signals used: consulting firm penalty, product company
  bonus, notice period scoring.