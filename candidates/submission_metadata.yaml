methodology_summary: >
  Two-stage ranking pipeline: TF-IDF pre-filter (7.5s) reduces 99,959 
  candidates to top 5,000, then BERT (all-MiniLM-L6-v2) semantic encoding 
  (44s). Multi-signal scoring: Semantic 35%, Skills 30%, Experience 15%, 
  Behavioral 20%, with JD-specific bonuses (product company +0.08, 
  location +0.08, notice period +0.10) and consulting firm penalty (-0.35). 
  7-rule honeypot detection removes 41 impossible profiles (keyword stuffers, 
  non-tech titles with AI keywords, impossible durations, bot behavior). 
  Scores normalized 0-1 for better spread. NDCG@10: 0.6511, std dev: 0.1738, 
  runtime: 51 seconds. No GPU, no API calls, fully offline.