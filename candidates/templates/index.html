<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Candidate Ranker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .navbar {
            background: #185FA5;
            padding: 14px 24px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }
        .nav-title { color: white; font-size: 16px; font-weight: 500; }
        .nav-badge {
            background: #378ADD;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #ddd;
            padding: 24px;
            max-width: 750px;
            margin: 0 auto 20px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 500;
            color: #222;
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-family: sans-serif;
        }
        textarea:focus {
            outline: none;
            border-color: #185FA5;
        }
        .file-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
            border: 1px dashed #ddd;
            border-radius: 8px;
            background: #f9f9f9;
            color: #555;
        }
        .hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .btn {
            background: #185FA5;
            color: white;
            border: none;
            padding: 13px 0;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            margin-top: 18px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover { background: #0C447C; }
        .btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        /* Error box */
        .error-box {
            background: #FCEBEB;
            border-left: 3px solid #A32D2D;
            padding: 10px 14px;
            font-size: 13px;
            color: #A32D2D;
            border-radius: 0 8px 8px 0;
            margin-bottom: 16px;
        }

        /* Loading indicator */
        .loading {
            display: none;
            text-align: center;
            margin-top: 16px;
            color: #185FA5;
            font-size: 14px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-top: 2px solid #185FA5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <span class="nav-title">AI Candidate Ranker</span>
        <span class="nav-badge">India Runs 2026</span>
    </div>

    <div class="card">
        <div class="card-title">Find Best Candidates</div>

        <!-- Error message -->
        {% if error %}
        <div class="error-box">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/rank/"
              enctype="multipart/form-data"
              id="rankForm">
            {% csrf_token %}

            <label>Job Description *</label>
            <textarea name="jd"
                id="jd"
                placeholder="Paste Job Description here...
Example: We need a Senior Python Django developer with 3 years experience, SQL and REST API skills."
                required>{% if request.POST.jd %}{{ request.POST.jd }}{% endif %}</textarea>

            <label>Upload Candidates CSV (optional)</label>
            <input type="file" name="csv_file"
                   accept=".csv" class="file-input">
            <div class="hint">
                Leave empty to use default dataset.
                CSV must have columns: candidate_id, name, resume_text
            </div>

            <button type="submit" class="btn" id="submitBtn">
                Find Best Candidates →
            </button>

            <!-- Loading indicator -->
            <div class="loading" id="loadingDiv">
                <span class="loading-spinner"></span>
                AI is ranking candidates... please wait (5-10 seconds)
            </div>
        </form>
    </div>

    <script>
        document.getElementById('rankForm').addEventListener('submit', function() {
            var jd = document.getElementById('jd').value.trim();
            if (jd.length > 0) {
                document.getElementById('loadingDiv').style.display = 'block';
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').innerText = 'Processing...';
            }
        });
    </script>

</body>
</html>
